<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#101014">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="/manifest.webmanifest">
<link rel="icon" href="/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="/icon.svg">
<title>liquid</title>
<style>
  :root {
    color-scheme: dark;
    --bg:#101014; --panel:#17171d; --line:#26262e; --dim:#7a7a88;
    --accent:#3d5296; --accent-soft:#232335;
  }
  * { box-sizing:border-box; }
  body { margin:0; height:100dvh; overflow:hidden; background:var(--bg); color:#e6e6ea;
         font:15px/1.5 system-ui,sans-serif; touch-action:manipulation; }
  button { font:inherit; border:0; border-radius:8px; cursor:pointer; color:white;
           background:var(--accent); padding:0.55rem 1rem; }
  button:disabled { opacity:0.5; cursor:default; }
  input { font:inherit; color:inherit; background:var(--panel); border:1px solid #33333e;
          border-radius:8px; padding:0.6rem 0.8rem; outline:none; }
  input:focus { border-color:#4a5a8c; }

  /* ---- login ---- */
  #login { height:100%; display:flex; flex-direction:column; align-items:center;
           justify-content:center; gap:0.9rem; }
  #login h1 { font-size:1.8rem; margin:0; letter-spacing:0.04em; }
  #login p { color:var(--dim); margin:0; }
  #login form { display:flex; flex-direction:column; gap:0.6rem; width:min(20rem,85vw); }
  #login .err { color:#f0a0a0; min-height:1.2em; font-size:0.85rem; }

  /* ---- shell ---- */
  #shell { display:none; height:100%; position:relative; }
  #shell.active { display:block; }

  /* home grid */
  #home { position:absolute; inset:0; overflow-y:auto; padding:2.2rem 1.6rem 6rem; }
  #home h2 { font-weight:500; font-size:0.85rem; letter-spacing:0.14em; color:var(--dim);
             text-transform:uppercase; margin:0 0 1.1rem; }
  #grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(5.2rem, 1fr));
          gap:1.1rem 0.6rem; max-width:60rem; }
  .appicon { display:flex; flex-direction:column; align-items:center; gap:0.45rem;
             cursor:pointer; border-radius:12px; padding:0.6rem 0.2rem; background:transparent; }
  .appicon:hover { background:#ffffff0d; }
  .appicon .glyph { width:3.6rem; height:3.6rem; border-radius:16px; background:var(--panel);
                    border:1px solid var(--line); display:flex; align-items:center;
                    justify-content:center; font-size:1.9rem; position:relative;
                    box-shadow:0 4px 14px rgba(0,0,0,0.35); }
  .appicon .badge { position:absolute; top:-0.3rem; right:-0.3rem; font-size:0.8rem;
                    filter:drop-shadow(0 2px 4px rgba(0,0,0,0.6)); }
  .appicon .label { font-size:0.78rem; color:#c9c9d4; text-align:center; max-width:6.4rem;
                    overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  @keyframes pulse { 50% { opacity:0.35; } }
  #empty { color:var(--dim); max-width:26rem; line-height:1.7; }
  #empty b { color:#c9c9d4; }

  /* windows (desktop) */
  .window { position:absolute; min-width:280px; min-height:200px; background:var(--panel);
            border:1px solid #30303c; border-radius:12px; display:flex; flex-direction:column;
            box-shadow:0 12px 40px rgba(0,0,0,0.55); resize:both; overflow:hidden; }
  .window.focused { border-color:#46466a; }
  .titlebar { display:flex; align-items:center; gap:0.5rem; padding:0.4rem 0.65rem;
              background:#1d1d26; border-bottom:1px solid var(--line); cursor:grab;
              user-select:none; touch-action:none; }
  .titlebar:active { cursor:grabbing; }
  .titlebar .ticon { font-size:0.95rem; }
  .titlebar .tname { font-size:0.85rem; color:#c9c9d4; overflow:hidden;
                     text-overflow:ellipsis; white-space:nowrap; flex:1; }
  .titlebar button { background:transparent; color:var(--dim); padding:0.1rem 0.35rem;
                     border-radius:6px; font-size:0.9rem; }
  .titlebar button:hover { background:#ffffff14; color:white; }
  .window iframe { flex:1; border:0; width:100%; background:var(--bg); }
  .window.dragging iframe { pointer-events:none; }
  .window.maximized { inset:0 !important; width:100% !important; height:100% !important;
                      border-radius:0; resize:none; }
  .histpop { position:absolute; top:2.1rem; right:0.4rem; width:min(22rem, 92%); max-height:55%;
             overflow-y:auto; background:#1b1b24; border:1px solid #30303c; border-radius:10px;
             box-shadow:0 10px 30px rgba(0,0,0,0.55); z-index:5; padding:0.3rem 0; }
  .histpop .commit { padding:0.35rem 0.7rem; font-size:0.8rem; display:flex; gap:0.5rem; }
  .histpop .commit code { color:#8fa8e8; }
  .histpop .commit span { flex:1; color:#c9c9d4; overflow:hidden; text-overflow:ellipsis;
                          white-space:nowrap; }
  .histpop .commit small { color:var(--dim); }
  .histpop .none { padding:0.5rem 0.8rem; color:var(--dim); font-size:0.85rem; }

  /* dock */
  #dock { position:fixed; left:50%; bottom:0.9rem; transform:translateX(-50%); z-index:45;
          display:none; gap:0.35rem; background:#16161ccc; backdrop-filter:blur(12px);
          border:1px solid #2c2c38; border-radius:14px; padding:0.35rem 0.5rem; }
  #dock.visible { display:flex; }
  #dock button { background:transparent; font-size:1.25rem; padding:0.25rem 0.45rem;
                 border-radius:9px; }
  #dock button:hover { background:#ffffff14; }
  @media (max-width:720px) { #dock { display:none !important; } }

  /* mobile fullscreen app */
  #mobileapp { display:none; position:absolute; inset:0; z-index:40; background:var(--bg);
               flex-direction:column; }
  #mobileapp.open { display:flex; }
  #mobileapp header { display:flex; align-items:center; gap:0.6rem; padding:0.5rem 0.8rem;
                      border-bottom:1px solid var(--line); }
  #mobileapp header b { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  #mobileapp header button { background:transparent; color:#c9c9d4; padding:0.2rem 0.5rem; }
  #mobileapp iframe { flex:1; border:0; width:100%; }

  /* chat */
  #chatfab { position:fixed; right:1.1rem; bottom:calc(1.1rem + env(safe-area-inset-bottom));
             z-index:60; width:3.4rem; height:3.4rem; border-radius:50%; font-size:1.4rem;
             box-shadow:0 8px 24px rgba(0,0,0,0.5); display:flex; align-items:center;
             justify-content:center; }
  #chatfab.busy { animation:pulse 1.2s ease-in-out infinite; }
  #chatfab::after { content:""; position:absolute; top:0.25rem; right:0.25rem; width:0.7rem;
                    height:0.7rem; border-radius:50%; background:#e0645c; display:none; }
  #chatfab.unread::after { display:block; }
  body.chat-open #chatfab { display:none; } /* never fight the keyboard's enter key */
  .conv .unreaddot { width:0.5rem; height:0.5rem; border-radius:50%; background:#e0645c;
                     align-self:center; flex-shrink:0; }
  #stopbtn { background:#5c2b2b; }
  #chat { position:fixed; left:0; top:0; width:min(24rem, 100vw); height:min(68dvh, 44rem);
          z-index:50; background:#131319; border:1px solid #30303c; border-radius:14px;
          display:flex; flex-direction:column; overflow:hidden;
          box-shadow:0 18px 50px rgba(0,0,0,0.55);
          opacity:0; transform:scale(0.97); pointer-events:none;
          transition:opacity 0.14s ease, transform 0.14s ease; }
  #chat.open { opacity:1; transform:none; pointer-events:auto; }
  #chat header { display:flex; align-items:center; gap:0.4rem; padding:0.55rem 0.7rem;
                 border-bottom:1px solid var(--line); cursor:grab; user-select:none;
                 touch-action:none; }
  #chat header:active { cursor:grabbing; }
  @media (max-width:720px) {
    #chat { left:0 !important; top:0 !important; width:100vw; height:100dvh;
            border-radius:0; border:0; }
    #chat header { cursor:default; }
  }
  #chat header b { flex:1; font-size:0.95rem; overflow:hidden; text-overflow:ellipsis;
                   white-space:nowrap; }
  #chat header button { background:transparent; color:var(--dim); padding:0.2rem 0.45rem; }
  #chat header button:hover { color:white; }
  #convlist { display:none; position:absolute; top:2.9rem; left:0.6rem; right:0.6rem; z-index:5;
              background:#1b1b24; border:1px solid #30303c; border-radius:10px; max-height:50%;
              overflow-y:auto; box-shadow:0 10px 30px rgba(0,0,0,0.5); }
  #convlist.open { display:block; }
  .conv { padding:0.5rem 0.7rem; cursor:pointer; display:flex; gap:0.4rem; font-size:0.88rem;
          color:#c9c9d4; }
  .conv:hover { background:#242432; }
  .conv.active { color:white; background:var(--accent-soft); }
  .conv span:first-child { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .conv .del { color:var(--dim); }
  #log { flex:1; overflow-y:auto; padding:0.9rem; display:flex; flex-direction:column;
         gap:0.7rem; }
  .msg { max-width:100%; padding:0.5rem 0.75rem; border-radius:10px; overflow-wrap:break-word; }
  .msg p { margin:0.35em 0; } .msg p:first-child { margin-top:0; } .msg p:last-child { margin-bottom:0; }
  .user { align-self:flex-end; background:#2b3a5c; white-space:pre-wrap; }
  .bot { align-self:flex-start; background:#1c1c24; }
  .errmsg { align-self:flex-start; background:#3a1c1c; color:#f0b0b0; }
  .scheduled { align-self:center; color:var(--dim); font-size:0.8rem; font-style:italic;
               background:transparent; white-space:pre-wrap; }
  .msg code { background:#0c0c10; padding:0.1em 0.35em; border-radius:5px; font-size:0.88em; }
  .msg pre { background:#0c0c10; padding:0.6rem 0.8rem; border-radius:8px; overflow-x:auto; }
  .msg pre code { background:transparent; padding:0; }
  .msg a { color:#8fa8e8; }
  #status { font-size:0.75rem; color:var(--dim); padding:0 0.9rem 0.35rem; min-height:1.1rem; }
  #composer { display:flex; gap:0.5rem; padding:0.6rem 0.8rem calc(0.6rem + env(safe-area-inset-bottom)); border-top:1px solid var(--line); }
  #composer input { flex:1; min-width:0; }

  /* app context menu */
  #appmenu { position:fixed; z-index:65; min-width:12rem; background:#1b1b24;
             border:1px solid #30303c; border-radius:10px; padding:0.25rem;
             box-shadow:0 12px 34px rgba(0,0,0,0.6); display:none; }
  #appmenu.open { display:block; }
  #appmenu button { display:block; width:100%; text-align:left; background:transparent;
                    color:#d5d5e0; padding:0.45rem 0.7rem; border-radius:7px; font-size:0.9rem; }
  #appmenu button:hover { background:#26263a; }
  #appmenu button.danger { color:#f0a0a0; }
  #appmenu hr { border:0; border-top:1px solid #2a2a36; margin:0.25rem 0.4rem; }

  /* pipeline banner */
  #pipeline { position:fixed; top:0; left:0; right:0; z-index:35; display:none;
              padding:0.55rem 1rem; font-size:0.9rem; align-items:center; gap:0.7rem;
              border-bottom:1px solid #3a3a4a; }
  #pipeline.show { display:flex; }
  #pipeline.reviewing { background:#1c2436; color:#a8c0f0; }
  #pipeline.rejected { background:#3a2418; color:#f0c89a; }
  #pipeline .msg { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  #pipeline button { padding:0.35rem 0.7rem; font-size:0.82rem; }
  #pipeline .ghost { background:transparent; color:inherit; border:1px solid #ffffff33; }
  #home.pushed { padding-top:3.6rem; }
  #modepill { position:fixed; top:0.7rem; right:0.9rem; z-index:30; font-size:0.72rem;
              padding:0.2rem 0.6rem; border-radius:999px; background:#1c1c26; color:var(--dim);
              border:1px solid var(--line); cursor:pointer; }
  #modepill:hover { color:#c9c9d4; }
  #modepill.reviewed { color:#a8c0f0; border-color:#33436a; }

  /* toast */
  #toast { position:fixed; left:50%; bottom:calc(1.4rem + env(safe-area-inset-bottom));
           transform:translateX(-50%) translateY(200%); transition:transform 0.25s ease;
           background:#22222e; border:1px solid #3a3a4a; padding:0.55rem 1rem;
           border-radius:10px; z-index:70; font-size:0.9rem; box-shadow:0 8px 24px rgba(0,0,0,0.5); }
  #toast.show { transform:translateX(-50%); }
</style>
</head>
<body>

<div id="login">
  <h1>liquid</h1>
  <p id="login-hint"></p>
  <form id="login-form">
    <input id="password" type="password" placeholder="Password" autocomplete="current-password">
    <button type="submit">Enter</button>
    <div class="err" id="login-err"></div>
  </form>
</div>

<div id="shell">
  <div id="pipeline">
    <span class="msg" id="pipeline-msg"></span>
    <button id="pipeline-approve" class="ghost" hidden>Deploy anyway</button>
    <button id="pipeline-dismiss" class="ghost">Dismiss</button>
  </div>
  <div id="modepill" title="Deploy pipeline mode — click to toggle">vibe</div>
  <div id="home">
    <h2>liquid</h2>
    <div id="grid"></div>
    <p id="empty" hidden>No apps yet. Double-tap anywhere (or tap <b>💬</b>) and ask liquid
      to build one — <i>“build me a calculator”</i> is a fine place to start. It will appear
      here, live.</p>
  </div>

  <div id="mobileapp">
    <header><button id="mobileback">←</button><b id="mobiletitle"></b>
      <button id="mobilereload">↻</button></header>
    <iframe id="mobileframe" title="app"></iframe>
  </div>

  <div id="dock"></div>

  <button id="chatfab" title="Chat with liquid">💬</button>

  <aside id="chat">
    <header>
      <button id="convtoggle" title="Conversations">☰</button>
      <b id="convtitle">New conversation</b>
      <button id="bell" title="Push notifications">🔕</button>
      <button id="newchat" title="New conversation">＋</button>
      <button id="chatclose" title="Close">✕</button>
    </header>
    <div id="convlist"></div>
    <div id="log"></div>
    <div id="status"></div>
    <form id="composer">
      <input id="input" placeholder="Ask liquid…" autocomplete="off">
      <button id="stopbtn" type="button" hidden title="Stop">⏹</button>
      <button id="send" type="submit" disabled>Send</button>
    </form>
  </aside>

  <div id="appmenu"></div>
  <div id="toast"></div>
</div>

<script>
"use strict";
const $ = (id) => document.getElementById(id);
const RECONNECT_DELAY_MS = 1500;
const LAYOUT_SAVE_DEBOUNCE_MS = 600;
const isMobile = () => window.matchMedia("(max-width: 720px)").matches;

/* ---------- tiny markdown ---------- */
function escapeHtml(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function renderMarkdown(src){
  const parts = src.split(/```/); let html = "";
  for (let i = 0; i < parts.length; i++) {
    if (i % 2 === 1) {
      const body = parts[i].replace(/^[a-zA-Z0-9_-]*\n/, "");
      html += `<pre><code>${escapeHtml(body)}</code></pre>`; continue;
    }
    let t = escapeHtml(parts[i]);
    t = t.replace(/`([^`\n]+)`/g, "<code>$1</code>");
    t = t.replace(/\*\*([^*\n]+)\*\*/g, "<b>$1</b>");
    t = t.replace(/\bhttps?:\/\/[^\s<]+/g, u => `<a href="${u}" target="_blank" rel="noopener">${u}</a>`);
    html += t.split(/\n{2,}/).map(p => `<p>${p.replace(/\n/g,"<br>")}</p>`).join("");
  }
  return html;
}

/* ---------- auth ---------- */
let token = localStorage.getItem("liquid_token");
async function api(path, options = {}) {
  const headers = Object.assign({ "Content-Type": "application/json" }, options.headers);
  if (token) headers["Authorization"] = `Bearer ${token}`;
  const response = await fetch(path, Object.assign({}, options, { headers }));
  if (response.status === 401) { showLogin(false); throw new Error("unauthorized"); }
  return response;
}
let passwordIsSet = true;
async function boot() {
  const status = await (await fetch("/api/auth/status")).json();
  passwordIsSet = status.password_set;
  if (token && passwordIsSet) {
    const probe = await fetch("/api/apps", { headers: { Authorization: `Bearer ${token}` } });
    if (probe.ok) { enterShell((await probe.json()).apps); return; }
    token = null; localStorage.removeItem("liquid_token");
  }
  showLogin(!passwordIsSet);
}
function showLogin(isSetup) {
  $("shell").classList.remove("active");
  $("login").style.display = "flex";
  $("login-hint").textContent = isSetup
    ? "First boot — choose a password (8+ characters)." : "Welcome back.";
}
$("login-form").onsubmit = async (e) => {
  e.preventDefault();
  const password = $("password").value;
  const path = passwordIsSet ? "/api/auth/login" : "/api/auth/setup";
  const response = await fetch(path, { method:"POST",
    headers:{ "Content-Type":"application/json" }, body: JSON.stringify({ password }) });
  const body = await response.json();
  if (!response.ok) { $("login-err").textContent = body.error ?? "failed"; return; }
  token = body.token; localStorage.setItem("liquid_token", token);
  enterShell((await (await api("/api/apps")).json()).apps);
};

/* ---------- shell state ---------- */
let apps = [];
let layout = { windows: {} };   // appId -> {x,y,w,h}
let zCounter = 10;
const openWindows = new Map();  // appId -> element

async function enterShell(appList) {
  apps = appList;
  $("login").style.display = "none";
  $("shell").classList.add("active");
  try { layout = await (await api("/api/shell")).json(); } catch { layout = {}; }
  if (!layout || typeof layout !== "object") layout = {};
  if (!layout.windows) layout.windows = {};
  renderGrid();
  if (!isMobile()) {
    for (const id of Object.keys(layout.windows)) {
      if (apps.some(a => a.id === id)) openApp(id, false);
    }
  }
  await loadConversations();
  connect();
  initPush();
  initPipeline();
}

/* ---------- deploy pipeline ---------- */
async function initPipeline() {
  try {
    const p = await (await api("/api/pipeline")).json();
    renderMode(p.mode);
    renderPipeline(p.status);
  } catch {}
}
function renderMode(mode) {
  const pill = $("modepill");
  pill.textContent = mode;
  pill.classList.toggle("reviewed", mode === "reviewed");
}
function renderPipeline(status) {
  const bar = $("pipeline");
  const msg = $("pipeline-msg");
  const approve = $("pipeline-approve");
  bar.className = "";
  if (!status || status.state === "clean") {
    bar.classList.remove("show");
    $("home").classList.remove("pushed");
    return;
  }
  bar.classList.add("show");
  $("home").classList.add("pushed");
  if (status.state === "reviewing") {
    bar.classList.add("reviewing");
    msg.textContent = "⏳ Reviewing a change before it goes live…";
    approve.hidden = true;
  } else if (status.state === "rejected") {
    bar.classList.add("rejected");
    msg.textContent = "⚠️ A change was rejected and is not live: " + (status.reasoning || "");
    approve.hidden = false;
  }
}
$("modepill").onclick = async () => {
  const current = $("modepill").textContent;
  const next = current === "reviewed" ? "vibe" : "reviewed";
  try {
    await api("/api/pipeline", { method: "PUT", body: JSON.stringify({ mode: next }) });
    renderMode(next);
    toast(next === "reviewed" ? "Reviewed mode — changes get checked before going live" : "Vibe mode — changes ship immediately");
  } catch { toast("Couldn't change mode"); }
};
$("pipeline-approve").onclick = async () => {
  try { await api("/api/pipeline/approve", { method: "POST" }); toast("Deployed"); }
  catch { toast("Approve failed"); }
};
$("pipeline-dismiss").onclick = () => { $("pipeline").classList.remove("show"); $("home").classList.remove("pushed"); };

/* ---------- push notifications ---------- */
let swReg = null;
async function initPush() {
  if (!("serviceWorker" in navigator)) return;
  try { swReg = await navigator.serviceWorker.register("/sw.js"); } catch {}
  updateBell();
}
function b64ToU8(b64) {
  const pad = "=".repeat((4 - (b64.length % 4)) % 4);
  const raw = atob((b64 + pad).replace(/-/g, "+").replace(/_/g, "/"));
  return Uint8Array.from(raw, (c) => c.charCodeAt(0));
}
async function currentSubscription() {
  try { return swReg ? await swReg.pushManager.getSubscription() : null; } catch { return null; }
}
async function updateBell() {
  $("bell").textContent = (await currentSubscription()) ? "🔔" : "🔕";
}
$("bell").onclick = async () => {
  if (!swReg) { toast("Notifications need a service worker (https or localhost)"); return; }
  const existing = await currentSubscription();
  try {
    if (existing) {
      await api("/api/push/unsubscribe", { method: "POST", body: JSON.stringify({ endpoint: existing.endpoint }) });
      await existing.unsubscribe();
      toast("Notifications off");
    } else {
      const permission = await Notification.requestPermission();
      if (permission !== "granted") { toast("Notifications blocked by the browser"); return; }
      const { key } = await (await api("/api/push/key")).json();
      const sub = await swReg.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: b64ToU8(key),
      });
      const json = sub.toJSON();
      await api("/api/push/subscribe", {
        method: "POST",
        body: JSON.stringify({ endpoint: sub.endpoint, keys: { p256dh: json.keys.p256dh, auth: json.keys.auth } }),
      });
      toast("Notifications on 🔔");
      api("/api/push/test", { method: "POST" }); // instant proof it works
    }
  } catch (err) { toast("Push setup failed: " + err); }
  updateBell();
};

/* ---------- unread state ---------- */
const unread = new Set();
function updateUnreadUi() {
  $("chatfab").classList.toggle("unread", unread.size > 0);
}

function renderGrid() {
  const grid = $("grid");
  grid.innerHTML = "";
  for (const app of apps) {
    const el = document.createElement("div");
    el.className = "appicon";
    const failed = app.backend && app.backend.state === "failed";
    el.innerHTML = `<div class="glyph">${escapeHtml(app.icon)}${failed ? '<span class="badge">⚠️</span>' : ""}</div>
                    <div class="label">${escapeHtml(app.name)}</div>`;
    el.title = failed
      ? `${app.name} — its backend crashed; ask liquid to fix it`
      : (app.description || app.name);
    el.onclick = () => openApp(app.id, true);
    el.oncontextmenu = (e) => { e.preventDefault(); showAppMenu(app, e.clientX, e.clientY); };
    // long-press = context menu on touch
    let pressTimer = null;
    el.addEventListener("touchstart", (e) => {
      pressTimer = setTimeout(() => {
        pressTimer = null;
        const t = e.touches[0];
        showAppMenu(app, t.clientX, t.clientY);
      }, 550);
    }, { passive: true });
    el.addEventListener("touchend", () => { if (pressTimer) clearTimeout(pressTimer); });
    el.addEventListener("touchmove", () => { if (pressTimer) clearTimeout(pressTimer); });
    grid.appendChild(el);
  }
  $("empty").hidden = apps.length > 0;
}

/* ---- app context menu: lifecycle actions are conversations ---- */
function askLiquid(prefill) {
  summonChat();
  $("input").value = prefill;
  $("input").focus();
  $("input").setSelectionRange(prefill.length, prefill.length);
}
function showAppMenu(app, x, y) {
  const menu = $("appmenu");
  menu.innerHTML = "";
  const items = [
    ["Open", () => openApp(app.id, true)],
    null,
    ["Rename…", () => askLiquid(`Rename the ${app.name} app to: `)],
    ["Change icon…", () => askLiquid(`Change the ${app.name} app's icon to: `)],
    ["Improve…", () => askLiquid(`Improve the ${app.name} app: `)],
    ["What changed?", async () => {
      const data = await (await api(`/api/apps/${encodeURIComponent(app.id)}/log`)).json();
      const lines = data.commits.slice(0, 8).map(c => `${c.hash} ${c.subject}`).join("\n");
      toast(lines || "No history yet");
    }],
    null,
    ["Delete…", () => askLiquid(
      `Delete the ${app.name} app (remove apps/${app.id} and commit; git history keeps a copy).`
    ), "danger"],
  ];
  for (const item of items) {
    if (item === null) { menu.appendChild(document.createElement("hr")); continue; }
    const [label, action, cls] = item;
    const btn = document.createElement("button");
    btn.textContent = label;
    if (cls) btn.className = cls;
    btn.onclick = () => { hideAppMenu(); action(); };
    menu.appendChild(btn);
  }
  menu.classList.add("open");
  const w = menu.offsetWidth, h = menu.offsetHeight;
  menu.style.left = Math.min(x, innerWidth - w - 8) + "px";
  menu.style.top = Math.min(y, innerHeight - h - 8) + "px";
}
function hideAppMenu() { $("appmenu").classList.remove("open"); }
addEventListener("pointerdown", (e) => { if (!e.target.closest("#appmenu")) hideAppMenu(); });

function toast(text) {
  const el = $("toast");
  el.textContent = text;
  el.classList.add("show");
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove("show"), 3200);
}

/* ---------- windows ---------- */
let saveTimer = null;
function scheduleLayoutSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    api("/api/shell", { method:"PUT", body: JSON.stringify(layout) }).catch(() => {});
  }, LAYOUT_SAVE_DEBOUNCE_MS);
}

function openApp(id, focus) {
  const app = apps.find(a => a.id === id);
  if (!app) return;
  if (isMobile()) { openMobileApp(app); return; }
  if (openWindows.has(id)) { bringToFront(openWindows.get(id)); return; }

  const saved = layout.windows[id] ?? {};
  const win = document.createElement("div");
  win.className = "window";
  win.dataset.app = id;
  const x = saved.x ?? (60 + openWindows.size * 40);
  const y = saved.y ?? (60 + openWindows.size * 40);
  win.style.cssText = `left:${x}px; top:${y}px; width:${saved.w ?? 420}px; height:${saved.h ?? 520}px; z-index:${++zCounter};`;
  win.innerHTML = `
    <div class="titlebar">
      <span class="ticon">${escapeHtml(app.icon)}</span>
      <span class="tname">${escapeHtml(app.name)}</span>
      <button class="history" title="History">🕘</button>
      <button class="reload" title="Reload">↻</button>
      <button class="max" title="Maximize">▢</button>
      <button class="close" title="Close">✕</button>
    </div>
    <iframe src="/app/${encodeURIComponent(id)}/" title="${escapeHtml(app.name)}"></iframe>`;
  $("shell").appendChild(win);
  openWindows.set(id, win);
  layout.windows[id] = { x, y, w: win.offsetWidth, h: win.offsetHeight };
  scheduleLayoutSave();
  renderDock();

  win.addEventListener("pointerdown", () => bringToFront(win));
  win.querySelector(".close").onclick = (e) => {
    e.stopPropagation();
    win.remove(); openWindows.delete(id);
    delete layout.windows[id];
    scheduleLayoutSave();
    renderDock();
  };
  win.querySelector(".reload").onclick = (e) => {
    e.stopPropagation();
    win.querySelector("iframe").src = `/app/${encodeURIComponent(id)}/`;
  };
  win.querySelector(".max").onclick = (e) => {
    e.stopPropagation();
    win.classList.toggle("maximized");
    if (!win.classList.contains("maximized")) persistWindow(win);
  };
  win.querySelector(".history").onclick = async (e) => {
    e.stopPropagation();
    const existing = win.querySelector(".histpop");
    if (existing) { existing.remove(); return; }
    const pop = document.createElement("div");
    pop.className = "histpop";
    pop.innerHTML = `<div class="none">Loading…</div>`;
    win.appendChild(pop);
    try {
      const data = await (await api(`/api/apps/${encodeURIComponent(id)}/log`)).json();
      pop.innerHTML = data.commits.length === 0
        ? `<div class="none">No history yet.</div>`
        : data.commits.map(c => {
            const when = new Date(c.timestamp * 1000).toLocaleString(undefined,
              { month:"short", day:"numeric", hour:"2-digit", minute:"2-digit" });
            return `<div class="commit"><code>${escapeHtml(c.hash)}</code>
                    <span>${escapeHtml(c.subject)}</span><small>${when}</small></div>`;
          }).join("");
    } catch { pop.innerHTML = `<div class="none">Couldn't load history.</div>`; }
  };

  // drag via titlebar
  const bar = win.querySelector(".titlebar");
  bar.addEventListener("pointerdown", (e) => {
    if (e.target.tagName === "BUTTON") return;
    e.preventDefault();
    bringToFront(win);
    win.classList.add("dragging");
    const startX = e.clientX - win.offsetLeft;
    const startY = e.clientY - win.offsetTop;
    const move = (ev) => {
      win.style.left = Math.max(0, Math.min(ev.clientX - startX, innerWidth - 80)) + "px";
      win.style.top  = Math.max(0, Math.min(ev.clientY - startY, innerHeight - 60)) + "px";
    };
    const up = (ev) => {
      removeEventListener("pointermove", move);
      removeEventListener("pointerup", up);
      win.classList.remove("dragging");
      // edge snap: left/right edge → half screen; top edge → maximize
      const SNAP = 14;
      if (ev.clientY <= SNAP) {
        win.classList.add("maximized");
        return; // geometry untouched; un-maximize restores it
      }
      if (ev.clientX <= SNAP || ev.clientX >= innerWidth - SNAP) {
        const half = Math.floor(innerWidth / 2);
        win.style.left = ev.clientX <= SNAP ? "0px" : half + "px";
        win.style.top = "0px";
        win.style.width = half + "px";
        win.style.height = innerHeight + "px";
      }
      persistWindow(win);
    };
    addEventListener("pointermove", move);
    addEventListener("pointerup", up);
  });

  // persist native CSS resize
  new ResizeObserver(() => {
    if (!openWindows.has(id)) return;
    persistWindow(win);
  }).observe(win);

  if (focus) bringToFront(win);
}

function persistWindow(win) {
  const id = win.dataset.app;
  layout.windows[id] = {
    x: win.offsetLeft, y: win.offsetTop, w: win.offsetWidth, h: win.offsetHeight,
  };
  scheduleLayoutSave();
}

function bringToFront(win) {
  win.style.zIndex = ++zCounter;
  document.querySelectorAll(".window").forEach(w => w.classList.toggle("focused", w === win));
}

function renderDock() {
  const dock = $("dock");
  dock.innerHTML = "";
  for (const [id, win] of openWindows) {
    const app = apps.find(a => a.id === id);
    if (!app) continue;
    const btn = document.createElement("button");
    btn.textContent = app.icon;
    btn.title = app.name;
    btn.onclick = () => bringToFront(win);
    dock.appendChild(btn);
  }
  dock.classList.toggle("visible", openWindows.size > 0);
}

/* ---------- mobile app view ---------- */
function openMobileApp(app) {
  $("mobiletitle").textContent = `${app.icon} ${app.name}`;
  $("mobileframe").src = `/app/${encodeURIComponent(app.id)}/`;
  $("mobileapp").classList.add("open");
}
$("mobileback").onclick = () => {
  $("mobileapp").classList.remove("open");
  $("mobileframe").src = "about:blank";
};
$("mobilereload").onclick = () => { $("mobileframe").src = $("mobileframe").src; };

/* ---------- chat ---------- */
let conversations = [];
let activeConversation = null;
let currentBot = null;
let ws = null;

async function loadConversations() {
  conversations = (await (await api("/api/conversations")).json()).conversations;
  if (conversations.length > 0) await openConversation(conversations[0].id);
}
function renderConvList() {
  const box = $("convlist");
  box.innerHTML = "";
  for (const conv of conversations) {
    const el = document.createElement("div");
    el.className = "conv" + (conv.id === activeConversation ? " active" : "");
    const label = document.createElement("span");
    label.textContent = conv.title || "Untitled";
    if (unread.has(conv.id)) {
      const dot = document.createElement("span");
      dot.className = "unreaddot";
      el.appendChild(dot);
    }
    const del = document.createElement("span");
    del.className = "del"; del.textContent = "✕";
    del.onclick = async (e) => {
      e.stopPropagation();
      if (!confirm(`Delete "${conv.title}"?`)) return;
      await api(`/api/conversations/${conv.id}`, { method: "DELETE" });
      conversations = conversations.filter(c => c.id !== conv.id);
      if (activeConversation === conv.id) newConversation();
      renderConvList();
    };
    el.append(label, del);
    el.onclick = async () => { await openConversation(conv.id); $("convlist").classList.remove("open"); };
    box.appendChild(el);
  }
}
function bubble(cls, text, asMarkdown = false) {
  const el = document.createElement("div");
  el.className = "msg " + cls;
  if (asMarkdown) el.innerHTML = renderMarkdown(text); else el.textContent = text;
  $("log").appendChild(el);
  $("log").scrollTop = $("log").scrollHeight;
  return el;
}
async function openConversation(id) {
  activeConversation = id; currentBot = null;
  unread.delete(id); updateUnreadUi();
  const conv = conversations.find(c => c.id === id);
  $("convtitle").textContent = conv ? conv.title : "liquid";
  renderConvList();
  $("log").innerHTML = "";
  const data = await (await api(`/api/conversations/${id}/messages`)).json();
  for (const m of data.messages) {
    if (m.role === "user") bubble("user", m.content);
    else if (m.role === "assistant") bubble("bot", m.content, true);
    else if (m.role === "scheduled") bubble("scheduled", m.content);
    else bubble("errmsg", m.content);
  }
}
function newConversation() {
  activeConversation = null; currentBot = null;
  $("log").innerHTML = "";
  $("convtitle").textContent = "New conversation";
  renderConvList();
  $("input").focus();
}
$("newchat").onclick = newConversation;
$("convtoggle").onclick = () => { renderConvList(); $("convlist").classList.toggle("open"); };

/* ---- summonable chat: double-tap the desk and liquid appears there ---- */
function summonChat(x, y) {
  const chat = $("chat");
  chat.classList.add("open");
  document.body.classList.add("chat-open");
  if (activeConversation !== null) { unread.delete(activeConversation); updateUnreadUi(); renderConvList(); }
  if (!isMobile()) {
    if (typeof x === "number") {
      const w = chat.offsetWidth, h = chat.offsetHeight;
      const px = Math.max(8, Math.min(x - w / 2, innerWidth - w - 8));
      const py = Math.max(8, Math.min(y - 20, innerHeight - h - 8));
      chat.style.left = px + "px"; chat.style.top = py + "px";
      layout.chat = { x: px, y: py };
      scheduleLayoutSave();
    } else if (layout.chat) {
      chat.style.left = layout.chat.x + "px"; chat.style.top = layout.chat.y + "px";
    } else { // default: bottom-right, where the bubble was
      chat.style.left = Math.max(8, innerWidth - chat.offsetWidth - 16) + "px";
      chat.style.top = Math.max(8, innerHeight - chat.offsetHeight - 16) + "px";
    }
  }
  adjustChatForKeyboard();
  $("input").focus();
}
function closeChat() {
  $("chat").classList.remove("open");
  document.body.classList.remove("chat-open");
}
$("chatclose").onclick = closeChat;
$("chatfab").onclick = () => summonChat();
$("home").addEventListener("dblclick", (e) => {
  if (e.target.closest(".appicon")) return; // empty desk only
  summonChat(e.clientX, e.clientY);
});
addEventListener("keydown", (e) => {
  if (e.key === "Escape") { closeChat(); $("convlist").classList.remove("open"); hideAppMenu(); }
  // Ctrl+` cycles windows (Alt/Ctrl+Tab belong to the OS and browser)
  if (e.key === "`" && e.ctrlKey && openWindows.size > 0) {
    e.preventDefault();
    const wins = [...openWindows.values()].sort((a, b) => a.style.zIndex - b.style.zIndex);
    bringToFront(wins[0]); // lowest becomes top → round-robin
  }
});

// drag the chat panel by its header (desktop)
$("chat").querySelector("header").addEventListener("pointerdown", (e) => {
  if (isMobile() || e.target.tagName === "BUTTON") return;
  e.preventDefault();
  const chat = $("chat");
  const startX = e.clientX - chat.offsetLeft;
  const startY = e.clientY - chat.offsetTop;
  const move = (ev) => {
    chat.style.left = Math.max(0, Math.min(ev.clientX - startX, innerWidth - 80)) + "px";
    chat.style.top  = Math.max(0, Math.min(ev.clientY - startY, innerHeight - 60)) + "px";
  };
  const up = () => {
    removeEventListener("pointermove", move);
    removeEventListener("pointerup", up);
    layout.chat = { x: chat.offsetLeft, y: chat.offsetTop };
    scheduleLayoutSave();
  };
  addEventListener("pointermove", move);
  addEventListener("pointerup", up);
});

// keep the composer above the on-screen keyboard (mobile)
function adjustChatForKeyboard() {
  const chat = $("chat");
  if (!window.visualViewport || !isMobile() || !chat.classList.contains("open")) {
    chat.style.height = ""; return;
  }
  chat.style.height = window.visualViewport.height + "px";
}
if (window.visualViewport) {
  window.visualViewport.addEventListener("resize", adjustChatForKeyboard);
}

function connect() {
  const proto = location.protocol === "https:" ? "wss" : "ws";
  ws = new WebSocket(`${proto}://${location.host}/ws?token=${encodeURIComponent(token)}`);
  ws.onopen = () => { $("send").disabled = false; };
  ws.onclose = () => { $("send").disabled = true; setTimeout(connect, RECONNECT_DELAY_MS); };
  ws.onmessage = (raw) => {
    let ev; try { ev = JSON.parse(raw.data); } catch { return; }
    if (ev.type === "apps_changed") {
      const before = new Set(apps.map(a => a.id));
      apps = ev.apps;
      renderGrid();
      const fresh = apps.filter(a => !before.has(a.id));
      for (const app of fresh) toast(`${app.icon} ${app.name} is on your home screen`);
      // drop windows of apps that no longer exist
      for (const [id, win] of openWindows) {
        if (!apps.some(a => a.id === id)) { win.remove(); openWindows.delete(id); }
      }
      renderDock();
      return;
    }
    if (ev.type === "shell_command") {
      if (ev.action === "open_app") {
        const app = apps.find(a => a.id === ev.app);
        if (app) { openApp(ev.app, true); toast(`liquid opened ${app.icon} ${app.name}`); }
      }
      return;
    }
    if (ev.type === "notify") {
      toast(`🔔 ${ev.title}: ${ev.body}`);
      return;
    }
    if (ev.type === "pipeline") {
      renderPipeline(ev.status);
      return;
    }
    if (ev.type === "conversation_created") {
      conversations.unshift({ id: ev.conversation_id, title: ev.title });
      if (activeConversation === null) {
        activeConversation = ev.conversation_id;
        $("convtitle").textContent = ev.title;
      }
      renderConvList();
      return;
    }
    if (ev.type === "done" || ev.type === "error") {
      // Anything finishing out of view gets an unread mark.
      const chatOpen = $("chat").classList.contains("open");
      if (ev.conversation_id !== activeConversation || !chatOpen) {
        unread.add(ev.conversation_id);
        updateUnreadUi();
        renderConvList();
      }
    }
    if (ev.conversation_id !== activeConversation) return;
    switch (ev.type) {
      case "token": {
        if (!currentBot) { currentBot = bubble("bot", ""); currentBot.dataset.raw = ""; }
        currentBot.dataset.raw += ev.text;
        currentBot.innerHTML = renderMarkdown(currentBot.dataset.raw);
        $("log").scrollTop = $("log").scrollHeight;
        setStreaming(true);
        break;
      }
      case "tool":
        $("status").textContent = `⚙ ${ev.name}…`;
        $("chatfab").classList.add("busy");
        setStreaming(true);
        break;
      case "done":
        currentBot = null; $("status").textContent = "";
        $("chatfab").classList.remove("busy");
        setStreaming(false);
        break;
      case "error":
        bubble("errmsg", ev.message); currentBot = null;
        $("status").textContent = ""; $("chatfab").classList.remove("busy");
        setStreaming(false);
        break;
    }
  };
}

function setStreaming(active) {
  $("stopbtn").hidden = !active;
}
$("stopbtn").onclick = () => {
  if (ws && ws.readyState === WebSocket.OPEN && activeConversation !== null) {
    ws.send(JSON.stringify({ type: "stop", conversation_id: activeConversation }));
    $("status").textContent = "stopping…";
  }
};
$("composer").onsubmit = (e) => {
  e.preventDefault();
  const content = $("input").value.trim();
  if (!content || !ws || ws.readyState !== WebSocket.OPEN) return;
  bubble("user", content);
  currentBot = null;
  ws.send(JSON.stringify({ type:"user_message", content, conversation_id: activeConversation }));
  $("input").value = "";
};

boot();
</script>
